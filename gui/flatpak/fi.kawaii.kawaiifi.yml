app-id: fi.kawaii.kawaiifi
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: kawaiifi

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Required so nl80211 netlink sockets can enumerate and query the host's
  # wireless interfaces. This is for netlink access, not internet.
  - --share=network
  # Triggering scans is delegated to NetworkManager over the system bus.
  - --system-talk-name=org.freedesktop.NetworkManager

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/kawaiifi/cargo
    CARGO_NET_OFFLINE: 'true'

modules:
  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/blueprint-compiler.git
        tag: v0.20.4
        commit: cb333fb74a6cb0bd7506f05c222e8e057fa0a2e9

  - name: kawaiifi
    buildsystem: meson
    config-opts:
      - -Dcargo-home=/run/build/kawaiifi/cargo
    sources:
      - type: dir
        path: ..
        skip:
          - .flatpak-builder
          - builddir*
          - repo
          - '*.flatpak'
          - '*.snap'
      - cargo-sources.json
