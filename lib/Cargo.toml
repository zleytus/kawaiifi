[package]
name = "kawaiifi"
version = "0.1.0"
authors = ["Zach Leytus <zach.leytus@pm.me>"]
edition = "2024"
license = "MIT OR Apache-2.0"
readme = "README.md"

[dependencies]
byteorder = "1.3.4"
deku = { version = "0.20", features = ["logging"] }
derive_more = { version = "2.0", features = ["full"] }
enumflags2 = "0.7"
log = "0.4"
neli = "0.7"
num_enum = "0.7"
serde = { version = "1", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
env_logger = "*"
