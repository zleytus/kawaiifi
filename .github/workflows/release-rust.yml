name: Release Rust

on:
  workflow_dispatch:
  push:
    tags:
      - "kawaiifi-v*"

concurrency:
  group: release-rust-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Read and verify version
        id: version
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "kawaiifi") | .version')"
          ffi_version="$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "kawaiifi-ffi") | .version')"

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not determine the kawaiifi package version."
            exit 1
          fi

          if [ "$ffi_version" != "$version" ]; then
            echo "kawaiifi and kawaiifi-ffi versions do not match."
            echo "kawaiifi: $version"
            echo "kawaiifi-ffi: $ffi_version"
            exit 1
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            expected="${GITHUB_REF_NAME#kawaiifi-v}"
            if [ "$version" != "$expected" ]; then
              echo "Tag version does not match package version."
              echo "Tag: $GITHUB_REF_NAME"
              echo "Expected package version: $expected"
              echo "Actual package version: $version"
              exit 1
            fi
          fi

          if ! grep -q "^## $version - " CHANGELOG.md; then
            echo "CHANGELOG.md does not contain a release heading for $version."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p kawaiifi --all-targets -- -D warnings

      - name: Test
        run: cargo test -p kawaiifi

      - name: Verify package
        run: cargo publish -p kawaiifi --dry-run

  build-ffi:
    name: Build FFI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x64

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -p kawaiifi-ffi --all-targets -- -D warnings

      - name: Build
        run: cargo build -p kawaiifi-ffi --release

      - name: Stage SDK bundle
        shell: bash
        run: |
          mkdir -p sdk/lib sdk/include
          cp ffi/include/kawaiifi.h sdk/include/
          cp LICENSE-MIT LICENSE-APACHE sdk/

          case "$RUNNER_OS" in
            Linux)
              cp target/release/libkawaiifi.so sdk/lib/
              cp target/release/libkawaiifi.a sdk/lib/
              ;;
            macOS)
              cp target/release/libkawaiifi.dylib sdk/lib/
              cp target/release/libkawaiifi.a sdk/lib/
              ;;
            Windows)
              cp target/release/kawaiifi.dll sdk/lib/
              cp target/release/kawaiifi.lib sdk/lib/
              cp target/release/kawaiifi.dll.lib sdk/lib/
              ;;
          esac

      - name: Archive SDK bundle
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "kawaiifi-ffi-$VERSION-$TARGET.zip" ./sdk/*
          else
            tar -czf "kawaiifi-ffi-$VERSION-$TARGET.tar.gz" -C sdk .
          fi

      - name: Upload SDK bundle
        uses: actions/upload-artifact@v7
        with:
          name: ffi-${{ matrix.target }}
          path: kawaiifi-ffi-${{ needs.validate.outputs.version }}-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [validate, build-ffi]
    environment: release

    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p kawaiifi
