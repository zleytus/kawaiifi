name: Release .NET

on:
  workflow_dispatch:
  push:
    tags:
      - "Kawaiifi.Net-v*"

jobs:
  build-ffi:
    name: Build FFI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -p kawaiifi-ffi --all-targets -- -D warnings

      - name: Build
        run: cargo build -p kawaiifi-ffi --release

      - name: Stage SDK bundle
        shell: bash
        run: |
          mkdir -p sdk/lib sdk/include
          cp ffi/include/kawaiifi.h sdk/include/
          cp LICENSE-MIT LICENSE-APACHE sdk/
          cp target/release/libkawaiifi.so sdk/lib/ 2>/dev/null || true
          cp target/release/libkawaiifi.dylib sdk/lib/ 2>/dev/null || true
          cp target/release/kawaiifi.dll sdk/lib/ 2>/dev/null || true
          cp target/release/kawaiifi.dll.lib sdk/lib/ 2>/dev/null || true

      - name: Upload native library
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: sdk/

  publish-nuget:
    name: Pack .NET NuGet package
    runs-on: ubuntu-latest
    needs: build-ffi
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Download Linux native library
        uses: actions/download-artifact@v8
        with:
          name: linux-x64
          path: artifacts/linux-x64/

      - name: Download macOS native library
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64
          path: artifacts/macos-arm64/

      - name: Download Windows native library
        uses: actions/download-artifact@v8
        with:
          name: windows-x64
          path: artifacts/windows-x64/

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          expected="${tag#Kawaiifi.Net-v}"

          actual="$(dotnet msbuild dotnet/Kawaiifi.Net/Kawaiifi.Net.csproj -getProperty:Version -nologo)"

          if [ "$actual" != "$expected" ]; then
            echo "Tag version does not match package version."
            echo "Tag: $tag"
            echo "Expected package version: $expected"
            echo "Actual package version: $actual"
            exit 1
          fi

      - name: Pack
        run: >
          dotnet pack dotnet/Kawaiifi.Net --configuration Release
          -p:NativeLinuxX64=${{ github.workspace }}/artifacts/linux-x64/lib/libkawaiifi.so
          -p:NativeMacOSArm64=${{ github.workspace }}/artifacts/macos-arm64/lib/libkawaiifi.dylib
          -p:NativeWindowsX64=${{ github.workspace }}/artifacts/windows-x64/lib/kawaiifi.dll

      - name: Verify NuGet package contents
        run: |
          package="$(find dotnet/Kawaiifi.Net/bin/Release -name '*.nupkg' | head -n 1)"
          test -n "$package"
          test -f "${package%.nupkg}.snupkg"

          unzip -l "$package" > package-contents.txt
          grep -F "runtimes/linux-x64/native/libkawaiifi.so" package-contents.txt
          grep -F "runtimes/osx-arm64/native/libkawaiifi.dylib" package-contents.txt
          grep -F "runtimes/win-x64/native/kawaiifi.dll" package-contents.txt

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish
        run: >
          dotnet nuget push dotnet/Kawaiifi.Net/bin/Release/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
