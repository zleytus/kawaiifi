name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  build-and-test-lib:
    name: Build and test lib (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -p kawaiifi --all-targets -- -D warnings

      - name: Build
        run: cargo build -p kawaiifi

      - name: Test
        run: cargo test -p kawaiifi

  build-ffi:
    name: Build FFI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -p kawaiifi-ffi --all-targets -- -D warnings

      - name: Build
        run: cargo build -p kawaiifi-ffi --release

      - name: Stage SDK bundle
        shell: bash
        run: |
          mkdir -p sdk/lib sdk/include
          cp ffi/include/kawaiifi.h sdk/include/
          cp LICENSE-MIT LICENSE-APACHE sdk/
          cp target/release/libkawaiifi.so sdk/lib/ 2>/dev/null || true
          cp target/release/libkawaiifi.dylib sdk/lib/ 2>/dev/null || true
          cp target/release/kawaiifi.dll sdk/lib/ 2>/dev/null || true
          cp target/release/kawaiifi.dll.lib sdk/lib/ 2>/dev/null || true

      - name: Upload native library
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: sdk/

  build-c:
    name: Build C examples (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Configure
        run: cmake -B build
        working-directory: ffi/examples

      - name: Build
        run: cmake --build build
        working-directory: ffi/examples

  build-dotnet:
    name: Build .NET (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Build
        run: dotnet build dotnet

  pack-dotnet:
    name: Pack .NET NuGet package
    runs-on: ubuntu-latest
    needs: build-ffi
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Download Linux native library
        uses: actions/download-artifact@v8
        with:
          name: linux-x64
          path: artifacts/linux-x64/

      - name: Download macOS native library
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64
          path: artifacts/macos-arm64/

      - name: Download Windows native library
        uses: actions/download-artifact@v8
        with:
          name: windows-x64
          path: artifacts/windows-x64/

      - name: Pack
        run: >
          dotnet pack dotnet/Kawaiifi.Net
          -p:NativeLinuxX64=${{ github.workspace }}/artifacts/linux-x64/lib/libkawaiifi.so
          -p:NativeMacOSArm64=${{ github.workspace }}/artifacts/macos-arm64/lib/libkawaiifi.dylib
          -p:NativeWindowsX64=${{ github.workspace }}/artifacts/windows-x64/lib/kawaiifi.dll

      - name: Verify NuGet package contents
        run: |
          package="$(find dotnet/Kawaiifi.Net/bin/Release -name '*.nupkg' | head -n 1)"
          test -n "$package"
          test -f "${package%.nupkg}.snupkg"

          unzip -l "$package" > package-contents.txt
          grep -F "runtimes/linux-x64/native/libkawaiifi.so" package-contents.txt
          grep -F "runtimes/osx-arm64/native/libkawaiifi.dylib" package-contents.txt
          grep -F "runtimes/win-x64/native/kawaiifi.dll" package-contents.txt

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: |
            dotnet/Kawaiifi.Net/bin/Release/*.nupkg
            dotnet/Kawaiifi.Net/bin/Release/*.snupkg
